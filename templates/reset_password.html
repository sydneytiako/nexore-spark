<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Réinitialisation — NEXORE Spark</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0A3D2F;color:#F5EDE0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#0d2b1e;border:1px solid rgba(0,200,150,.15);border-radius:20px;padding:40px 32px;width:100%;max-width:420px;}
.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-size:24px;font-weight:700;color:#F5EDE0;}
.logo p{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#94c5a8;margin-top:4px;}
h2{font-size:18px;font-weight:600;margin-bottom:6px;}
p.sub{font-size:13px;color:#94c5a8;margin-bottom:24px;}
label{display:block;font-size:12px;color:#94c5a8;margin-bottom:5px;}
.inp-wrap{position:relative;margin-bottom:16px;}
input[type=password],input[type=text]{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(0,200,150,.15);border-radius:10px;padding:12px 42px 12px 14px;color:#F5EDE0;font-size:14px;outline:none;font-family:'Inter',sans-serif;}
input:focus{border-color:#00C896;background:rgba(0,200,150,.06);}
.toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94c5a8;font-size:16px;}
.btn{width:100%;padding:13px;background:#00C896;color:#0A3D2F;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .2s;}
.btn:hover{background:#009e76;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none;}
.msg.ok{background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.3);color:#00C896;}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;}
a{color:#00C896;text-decoration:none;font-size:13px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#00C896,#009e76);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L22 12L12 22L2 12Z" stroke="#0A3D2F" stroke-width="2" fill="#0A3D2F"/><circle cx="12" cy="12" r="3" fill="#F5EDE0"/></svg>
    </div>
    <h1>NEXORE Spark</h1>
    <p>IFT Madagascar</p>
  </div>
  <h2>Nouveau mot de passe</h2>
  <p class="sub">Choisissez un mot de passe sécurisé (min. 6 caractères).</p>
  <div>
    <label>Nouveau mot de passe</label>
    <div class="inp-wrap">
      <input type="password" id="pw1" placeholder="Min. 6 caractères">
      <button type="button" class="toggle" onclick="tPwd('pw1',this)">👁</button>
    </div>
    <label>Confirmer le mot de passe</label>
    <div class="inp-wrap">
      <input type="password" id="pw2" placeholder="Répétez le mot de passe">
      <button type="button" class="toggle" onclick="tPwd('pw2',this)">👁</button>
    </div>
    <button class="btn" onclick="doReset()">Réinitialiser</button>
    <div id="msg" class="msg"></div>
    <div style="text-align:center;margin-top:20px;"><a href="/">← Retour à la connexion</a></div>
  </div>
</div>
<script>
function tPwd(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}
async function doReset(){
  const pw1=document.getElementById('pw1').value;
  const pw2=document.getElementById('pw2').value;
  const msg=document.getElementById('msg');
  if(!pw1||pw1.length<6){showMsg('Le mot de passe doit faire au moins 6 caractères.','err');return;}
  if(pw1!==pw2){showMsg('Les mots de passe ne correspondent pas.','err');return;}
  const token=new URLSearchParams(window.location.search).get('token');
  if(!token){showMsg('Lien invalide ou expiré.','err');return;}
  const r=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:pw1})});
  const d=await r.json();
  if(d.success){showMsg('✓ Mot de passe réinitialisé ! Redirection...','ok');setTimeout(()=>window.location.href='/',2000);}
  else showMsg(d.error||'Erreur.','err');
}
function showMsg(txt,type){const m=document.getElementById('msg');m.textContent=txt;m.className=`msg ${type}`;m.style.display='block';}
</script>
</body>
</html>
